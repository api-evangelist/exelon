aid: exelon
name: Exelon
description: >-
  Exelon Corporation is one of the largest energy delivery companies in the
  United States, serving more than 10 million customers through its regulated
  electric and gas utility subsidiaries: Atlantic City Electric, BGE,
  ComEd, Delmarva Power, PECO, and Pepco. Headquartered in Chicago, Illinois,
  Exelon operates across multiple U.S. states. No public consumer-facing
  developer APIs have been identified for Exelon; customer self-service is
  conducted through utility portals.
